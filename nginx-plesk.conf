# Nginx additional directives for avolo.app — paste into Plesk → Hosting Settings → Additional nginx directives
# These go inside the server { } block that Plesk generates.

# Serve Next.js CSS/JS bundles directly from the standalone build output.
# This avoids Plesk's try_files returning 404 for /_next/static/ requests.
location /_next/static/ {
    alias /var/www/vhosts/avolo.app/httpdocs/.next/standalone/.next/static/;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
}

# Proxy all other requests to the PM2-managed Next.js standalone server.
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
