version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: avolo
      MYSQL_USER: avolo_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - avolo_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "avolo_user", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  avolo_mysql:
