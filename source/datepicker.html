            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .date-picker-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        body {
            background-color: #f9f9f7;
            color: #1a1c1b;
        }

<body class="min-h-screen flex flex-col font-body-md text-on-background">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background transition-all duration-300 ease-in-out">
<div class="flex justify-between items-center px-gutter py-4 max-w-container-max mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="flight_takeoff">flight_takeoff</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">SkyFlow</span>
</div>
<nav class="hidden md:flex gap-8 items-center">
<a class="font-label-caps text-label-caps text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity" href="#">Explore</a>
<a class="font-label-caps text-label-caps text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity" href="#">My Trips</a>
<a class="font-label-caps text-label-caps text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity" href="#">Profile</a>
</nav>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="menu">menu</span>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-section-padding pb-section-padding px-gutter">
<div class="w-full max-w-container-max">
<!-- Typeform Style Header -->
<div class="mb-stack-gap">
<h1 class="font-headline-lg text-headline-lg text-on-background mb-4">
                    When do you want to travel?
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Pick a date and tell us if you're flexible for better deals.
                </p>
</div>
<!-- Date Picker UI -->
<div class="bg-surface-container-low border border-outline-variant p-6 rounded-xl shadow-sm mb-12">
<div class="flex justify-between items-center mb-6">
<h2 class="font-headline-md text-body-lg font-bold">September 2024</h2>
<div class="flex gap-2">
<button class="p-2 hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">chevron_left</span>
</button>
<button class="p-2 hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</div>
<div class="date-picker-grid text-center text-label-caps text-on-surface-variant mb-2">
<div>MO</div><div>TU</div><div>WE</div><div>TH</div><div>FR</div><div>SA</div><div>SU</div>
</div>
<div class="date-picker-grid text-center font-body-md">
<div class="py-3 text-surface-dim">26</div><div class="py-3 text-surface-dim">27</div><div class="py-3 text-surface-dim">28</div><div class="py-3 text-surface-dim">29</div><div class="py-3 text-surface-dim">30</div><div class="py-3 text-surface-dim">31</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">1</div>
<div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">2</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">3</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">4</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">5</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">6</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">7</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">8</div>
<div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">9</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">10</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">11</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">12</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">13</div><div class="py-3 bg-primary text-on-primary rounded-lg cursor-pointer">14</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">15</div>
<div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">16</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">17</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">18</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">19</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">20</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">21</div><div class="py-3 hover:bg-surface-container rounded-lg cursor-pointer">22</div>
</div>
</div>
<!-- Flexibility Section -->
<div class="space-y-6">
<label class="font-label-caps text-label-caps text-on-surface-variant">DATES FLEXIBILITY</label>
<div class="flex flex-wrap gap-4">
<button class="flex flex-col items-center justify-center p-4 min-w-[120px] rounded-xl border border-primary bg-secondary-container text-on-secondary-container transition-all">
<span class="font-body-md font-bold">Exact dates</span>
<span class="text-[11px] opacity-70">No change</span>
</button>
<button class="flex flex-col items-center justify-center p-4 min-w-[120px] rounded-xl border border-outline-variant hover:border-primary transition-all">
<span class="font-body-md font-bold">± 1 day</span>
<span class="text-[11px] opacity-70">Flexible range</span>
</button>
<button class="flex flex-col items-center justify-center p-4 min-w-[120px] rounded-xl border border-outline-variant hover:border-primary transition-all">
<span class="font-body-md font-bold">± 3 days</span>
<span class="text-[11px] opacity-70">Best value</span>
</button>
<button class="flex flex-col items-center justify-center p-4 min-w-[120px] rounded-xl border border-outline-variant hover:border-primary transition-all">
<span class="font-body-md font-bold">± 7 days</span>
<span class="text-[11px] opacity-70">Maximum savings</span>
</button>
</div>
</div><div class="flex justify-between items-center mt-stack-gap">
<button class="flex flex-row items-center justify-center gap-2 text-on-surface-variant dark:text-surface-variant px-6 py-3 hover:bg-primary-container dark:hover:bg-primary-fixed-variant transition-colors rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-label-caps text-label-caps">Back</span>
</button>
<button class="flex flex-row items-center justify-center gap-2 bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container rounded-full px-8 py-4 hover:opacity-90 transition-opacity shadow-lg active:scale-95 transition-transform duration-200">
<span class="font-label-caps text-label-caps text-[14px]">Next</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
